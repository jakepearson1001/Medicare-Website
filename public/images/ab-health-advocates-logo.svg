<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160" role="img" aria-label="A&amp;B Health Advocates - Helping with your healthcare needs">
  <rect width="520" height="160" fill="white"/>

  <!-- Red circle -->
  <circle cx="72" cy="80" r="62" fill="#e02020"/>

  <!-- A&B text in circle -->
  <text x="72" y="76" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="30" fill="white">A&amp;B</text>
  <text x="72" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="12" fill="white" letter-spacing="1.5">HEALTH</text>

  <!-- "Health" in blue -->
  <text x="152" y="84" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="50" fill="#2a7fc1">Health</text>

  <!-- "Advocates" in red italic -->
  <text x="310" y="84" font-family="Georgia,Times New Roman,serif" font-style="italic" font-size="50" fill="#e02020">Advocates</text>

  <!-- Tagline -->
  <text x="152" y="118" font-family="Arial,Helvetica,sans-serif" font-style="italic" font-size="18" fill="#999999">Helping with your healthcare needs</text>
</svg>
